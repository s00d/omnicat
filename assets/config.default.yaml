#   image:
#     commands:
#       - imgcat {file}
#       - chafa {file}
#     hint: "brew install chafa or use iTerm2 imgcat"
#   notebook:
#     extensions: [ipynb]
#     commands:
#       - jupytext --to markdown -o - {file}
#     hint: "brew install jupytext"

behavior:
  preview_fallback: terminal
  on_unknown_format: fallback
  external_timeout_secs: 30
